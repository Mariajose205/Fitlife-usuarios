version: '3.8'

services:
  mysql-usuarios:
    image: mysql:8.0
    container_name: mysql-usuarios
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fitlife_usuarios_db
    ports:
      - "3306:3306"
    networks:
      - fitlife-network
    volumes:
      - mysql-usuarios-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  ms-usuarios:
    build: .
    container_name: ms-usuarios
    ports:
      - "8085:8085"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-usuarios:3306/fitlife_usuarios_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    networks:
      - fitlife-network
    depends_on:
      mysql-usuarios:
        condition: service_healthy
    restart: always

networks:
  fitlife-network:
    driver: bridge

volumes:
  mysql-usuarios-data:
