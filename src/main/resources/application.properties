# Server Configuration
server.port=8085
server.servlet.context-path=/api

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/fitlife_usuarios_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# CORS Configuration
spring.web.cors.allowed-origins=http://localhost:5173
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Logging
logging.level.com.fitlife.usuarios=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Application Info
spring.application.name=MS-usuarios
management.endpoints.web.exposure.include=health,info,circuitbreakers

# Resilience4j Circuit Breaker Configuration
resilience4j.circuitbreaker.instances.usuariosCB.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.usuariosCB.slidingWindowSize=10
resilience4j.circuitbreaker.instances.usuariosCB.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.usuariosCB.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.usuariosCB.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.usuariosCB.failureRateThreshold=50
resilience4j.circuitbreaker.instances.usuariosCB.slowCallRateThreshold=100
resilience4j.circuitbreaker.instances.usuariosCB.slowCallDurationThreshold=2s

# Resilience4j Retry Configuration
resilience4j.retry.instances.usuariosRetry.maxAttempts=3
resilience4j.retry.instances.usuariosRetry.waitDuration=1s
resilience4j.retry.instances.usuariosRetry.retryExceptions=java.io.IOException,java.util.concurrent.TimeoutException
